version: '3.8'

services:
  web:
    build: .
    ports:
      - "8085:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=hidroapp
      - DB_USER=root
      - DB_PASSWORD=hidroapp123

  db:
    image: mysql:8.0
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: hidroapp123
      MYSQL_DATABASE: hidroapp
      MYSQL_USER: hidroapp_user
      MYSQL_PASSWORD: hidroapp123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8889:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: hidroapp123
    depends_on:
      - db

volumes:
  mysql_data: